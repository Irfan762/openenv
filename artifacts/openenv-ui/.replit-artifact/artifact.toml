kind = "web"
previewPath = "/"
title = "OpenEnv DataCleaning UI"
version = "1.0.0"
id = "artifacts/openenv-ui"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20825

[services.development]
run = "pnpm --filter @workspace/openenv-ui run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/openenv-ui", "run", "build" ]
publicDir = "artifacts/openenv-ui/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20825"
BASE_PATH = "/"
